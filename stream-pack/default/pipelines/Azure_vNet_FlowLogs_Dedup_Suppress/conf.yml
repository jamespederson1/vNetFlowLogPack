output: default
streamtags: []
groups:
  suppDedup:
    name: Stateless Deduplication (no Redis)
    description: >-
      Uses Cribl's built-in Suppress function to deduplicate flow log events
      in-memory. No external dependencies required but NOT STATEFUL — dedup
      state is ephemeral, per-worker, and lost on restart. See pipeline
      comments for full details on limitations.
    index: 2
    disabled: false
asyncFuncTimeout: 1000
functions:
  - id: comment
    filter: "true"
    disabled: null
    conf:
      comment: >-
        STATELESS Deduplication Pipeline (No Redis Required).

        IMPORTANT: This pipeline is NOT stateful. The Suppress function
        maintains an in-memory cache that is:
          - EPHEMERAL: State is lost when the worker process restarts,
            including during Commit & Deploy operations. The first collection
            after a restart will pass all events through, including any that
            overlap with the previous collection window.
          - PER-WORKER: Each Cribl Stream worker maintains its own independent
            suppress cache. In a multi-worker deployment, if events from the
            same source are load-balanced across different workers, duplicates
            WILL slip through because Worker A has no visibility into Worker B's
            cache.
          - NOT PERSISTENT: There is no disk-backed state. If the worker
            crashes or is restarted, all dedup history is gone.

        When to use this pipeline:
          - Single-worker Cribl Stream deployments
          - Deployments with worker affinity enabled on the collector job
            (pins source events to a specific worker)
          - Dev/test environments where occasional duplicates are acceptable
          - Environments where Redis is not available and the trade-off of
            occasional duplicates is preferable to the operational overhead
            of deploying Redis

        When NOT to use this pipeline:
          - Multi-worker deployments WITHOUT worker affinity (use Redis dedup)
          - Environments where zero duplicate tolerance is required
          - High-frequency restart scenarios (CI/CD with frequent deploys)

        For stateful dedup that survives restarts and is shared across workers,
        use the Redis-based dedup pipelines instead:
          - Azure_vNet_FlowLogs_Dedup_15m (for 15-minute collector)
          - Azure_vNet_FlowLogs_Dedup_Redis (for hourly collector)

        How this pipeline works:
        1. After pre-processing, each event's _raw contains a flat JSON with
           the flowTuple, macAddress, time, and other fields that uniquely
           identify a flow record.
        2. We compute a SHA-256 hash of _raw to create a compact unique key.
        3. The Suppress function checks its in-memory cache for the key:
           - If NOT seen: event passes through, key is cached with a TTL
           - If ALREADY seen: event is dropped as a duplicate
        4. The temporary hash field is cleaned up before output.

        Designed for the 15-minute collection schedule (*/15 cron, -16m lookback)
        where the 1-minute overlap between collection windows produces
        duplicate events.

        Performance vs Redis:
          - Latency: Microseconds per event (in-memory hash lookup, no I/O)
            vs 0.5-2ms per event with Redis (network round-trips)
          - Throughput: Negligibly better than Redis for this use case
          - Memory: SHA-256 hashes (32 bytes each) x active events x TTL window
            — typically a few KB to a few MB even at scale
          - The performance difference is negligible for vNet Flow Log volumes;
            the choice should be driven by deployment architecture, not performance.

        WARNING: This pipeline expects pre-processed events (flowTuples already
        unrolled by Azure_vNet_FlowLogs_PreProcessing). It must run AFTER
        the PreProcessing pipeline.
  - id: comment
    filter: "true"
    disabled: null
    conf:
      comment: >-
        Step 1: Generate a SHA-256 hash of _raw to use as the dedup key.
        This captures the full identity of the pre-processed event including
        flowTuple, macAddress, time, aclID, rule, and all other fields.
        Using a hash keeps the suppress key compact and fixed-length.
    groupId: suppDedup
  - id: eval
    filter: "true"
    disabled: false
    conf:
      add:
        - name: __dedup_key
          value: C.Mask.sha256(_raw)
    description: Compute SHA-256 hash of _raw for dedup key
    groupId: suppDedup
  - id: comment
    filter: "true"
    disabled: null
    conf:
      comment: >-
        Step 2: Suppress duplicate events using the built-in Suppress function.
        The Suppress function maintains an IN-MEMORY ONLY cache (not stateful).
        - keyExpr: The field used to identify unique events (__dedup_key)
        - numEventsAllowed: 1 (allow only the first occurrence)
        - suppressPeriodSec: 1200 (20-minute window — covers 15m schedule + margin)
        - dropEventsMode: true (drop duplicates rather than marking them)
    groupId: suppDedup
  - id: suppress
    filter: "true"
    disabled: false
    conf:
      allow: 1
      suppressPeriodSec: 1200
      dropEventsMode: true
      keyExpr: "`${__dedup_key}`"
    description: >-
      Suppress duplicates (STATELESS — in-memory only, per-worker, lost on restart).
      Allows only 1 event per unique _raw hash within a 20-minute window.
    groupId: suppDedup
  - id: comment
    filter: "true"
    disabled: null
    conf:
      comment: >-
        Step 3: Clean up the temporary dedup key field before sending
        events downstream. The __dedup_key field was only needed for the
        suppress function and should not be included in the output.
    groupId: suppDedup
  - id: eval
    filter: "true"
    disabled: false
    conf:
      remove:
        - __dedup_key
    description: Remove temporary __dedup_key field from output events
    groupId: suppDedup
