id: default
groups: {}
comments: []
routes:
  - id: v15mSuppDedup
    name: AzureFlowLogs 15m Dedup (Suppress - No Redis)
    final: true
    disabled: true
    pipeline: Azure_vNet_FlowLogs_Dedup_Suppress
    description: "Stateless deduplication route for the 15-minute collection
      schedule using Cribl's built-in Suppress function. No external Redis
      required. Enable this route as an alternative to the Redis-based dedup
      when you want a simpler deployment with no external dependencies.
      Note: dedup state is per-worker and in-memory — not shared across
      workers. For multi-worker deployments, enable worker affinity on the
      collector job or use the Redis-based dedup instead."
    enableOutputExpression: false
    outputExpression: null
    filter: "true"
    clones: []
    output: default
  - id: v15mDedup
    name: AzureFlowLogs 15m Dedup (Redis)
    final: true
    disabled: true
    pipeline: Azure_vNet_FlowLogs_Dedup_15m
    description: "Deduplication route for the 15-minute collection schedule
      (*/15 cron with -16m lookback) using Redis for stateful dedup shared
      across workers. Enable this route when using the
      Azure_vNet_FlowLogs_15m_Dedup collector and you have Redis available.
      Preferred for multi-worker deployments."
    enableOutputExpression: false
    outputExpression: null
    filter: "true"
    clones: []
    output: default
  - id: S7a5qI
    name: AzureFlowLogs Dedup (Redis - Hourly)
    final: true
    disabled: true
    pipeline: Azure_vNet_FlowLogs_Dedup_Redis
    description: "Deduplication route for the hourly collection schedule
      (15 * * * * cron with -75m lookback). This route is typically not
      needed for the hourly collector since the -75m lookback with @h latest
      produces no overlapping windows. Enable only if using a custom schedule
      that may produce overlaps."
    enableOutputExpression: false
    outputExpression: null
    filter: "true"
    clones: []
    output: default
  - id: default
    name: default
    final: true
    disabled: false
    pipeline: main
    description: ""
    enableOutputExpression: false
    outputExpression: null
    filter: "true"
    clones: []
    output: default
